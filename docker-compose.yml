version: '3.8'

networks:
  red_servicios:
    driver: bridge

volumes:
  postgres_data:
    driver: local

services:
  web_server:
    image: nginx:alpine
    container_name: nginx_juan
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - red_servicios
    depends_on:
      - node_app

  node_app:
    build: ./node-api
    container_name: node_juan
    ports:
      - "${NODE_PORT}:${NODE_PORT}"
    environment:
      - DB_HOST=database
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - NODE_PORT=${NODE_PORT}
    networks:
      - red_servicios
    depends_on:
      - database

  database:
    image: postgres:16-alpine
    container_name: postgres_juan
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - red_servicios
    ports:
      - "5433:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_juan
    environment:
      PGADMIN_DEFAULT_EMAIL: juan.polania@correo.com
      PGADMIN_DEFAULT_PASSWORD: juanpass2024
    ports:
      - "5051:80"
    networks:
      - red_servicios
    depends_on:
      - database

  jupyter:
    image: jupyter/datascience-notebook
    container_name: jupyter_juan
    ports:
      - "8889:8888"
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
    volumes:
      - ./jupyter:/home/jovyan/work
    networks:
      - red_servicios
